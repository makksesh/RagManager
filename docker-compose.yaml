services:
  # Qdrant — vector store
  qdrant:
    image: qdrant/qdrant:latest
    container_name: naive_rag_qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"       # REST API + Web UI
      - "${QDRANT_GRPC_PORT:-6334}:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # PostgreSQL — metadata store
  postgres:
    image: postgres:16
    container_name: naive_rag_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-naive_rag}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # опционально: init scripts для схемы
      # - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-naive_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

